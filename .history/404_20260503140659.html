<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="preloader">
    <div class="preloader-inner">
      <canvas id="pl-canvas"></canvas>
      <div class="preloader-rings"><div class="pl-ring pl-ring-1"></div><div class="pl-ring pl-ring-2"></div><div class="pl-ring pl-ring-3"></div></div>

        <span class="pl-letter" style="--i:0">A</span><span class="pl-letter" style="--i:1">X</span><span class="pl-letter" style="--i:2">I</span><span class="pl-letter" style="--i:3">O</span><span class="pl-letter" style="--i:4">M</span><span class="pl-letter" style="--i:5">A</span><span class="pl-letter" style="--i:6">T</span><span class="pl-letter" style="--i:7">E</span>
        <div class="pl-scan-line"></div>
      </div>
      <div class="preloader-tagline"><span class="pl-tagline-text">Engineering Tomorrow</span></div>
      <div class="preloader-bar"><div class="preloader-progress"></div></div>
      <p class="preloader-text"><span class="typing-text">Initializing systems</span><span class="typing-cursor">|</span></p>
    </div>
  </div>
  <canvas id="global-canvas"></canvas>
  <div id="cursor-glow"></div><div id="cursor-dot"></div>

  <nav id="navbar" class="navbar">
    <div class="nav-container">
      <a href="/index.html" class="nav-logo">
        <img src="/images/logo.png" alt="Axiomate" class="logo-img" />

      </a>
      <div class="nav-links">
        <a href="/index.html" class="nav-link">Home</a>
        <a href="/index.html#services" class="nav-link">Services</a>
        <a href="/about.html" class="nav-link">About</a>
        <a href="/contact.html" class="nav-link">Contact</a>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>

  </nav>

  <section class="section" style="padding-top: 200px; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div class="container" style="text-align: center;">
      <div class="contact-grid" style="display: inline-block; background: var(--bg-glass-card); border: 1px solid var(--border-glass); border-radius: var(--radius-lg); padding: 80px 100px; backdrop-filter: blur(var(--card-blur)); text-align: center;">
        <h1 class="hero-title glitch-active" style="font-size: 6rem; margin-bottom: 20px;">404</h1>
        <h2 class="section-title" style="margin-bottom: 30px;">Connection <span class="gradient-text">Lost</span></h2>
        <p class="about-text" style="margin-bottom: 40px;">The neural node you are looking for has been disconnected from the mainframe.</p>
        <a href="/index.html" class="btn btn-primary magnetic-btn" style="display: inline-flex;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px; transform: rotate(180deg);"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          <span>Return to Mainframe</span>
        </a>
      </div>
    </div>
  </section>

  <script type="module" src="/src/main.js"></script>
