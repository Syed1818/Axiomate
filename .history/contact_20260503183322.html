<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | Axiomate Tech Services</title>
  <meta name="description" content="Tell us about your project." />
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/style.css" />
</head>

<body>
  <!-- Preloader -->
  <div id="preloader">
    <div class="pl-cinematic-bar top"></div>
    <div class="pl-cinematic-bar bottom"></div>
    <div class="preloader-inner">
      <canvas id="matrix-canvas"></canvas>
      <div id="caption-box">
        <div class="caption-icon"></div>
        <p id="caption-text"></p>
      </div>
      <button id="enter-btn" class="enter-btn"><span>ENTER AXIOMATE</span></button>
    </div>
  </div>
  <canvas id="global-canvas"></canvas>
  <div id="cursor-glow"></div>
  <div id="cursor-dot"></div>

  <axiomate-navbar></axiomate-navbar>

  <section id="contact" class="section contact-hero-section">
    <div class="container">
      <div class="contact-grid contact-glass-panel">
        <div class="contact-left">
          <span class="section-tag reveal-up">// Let's Build</span>
          <h2 class="section-title reveal-up">Ready to <span class="gradient-text">Launch?</span></h2>
          <p class="contact-desc reveal-up">Tell us about your project and we'll get back within 24 hours.</p>
          <div class="contact-info reveal-up">
            <div class="contact-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.5">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                <polyline points="22,6 12,13 2,6" />
              </svg><span>hello@axiomate.tech</span></div>
            <div class="contact-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.5">
                <path
                  d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
              </svg><span>+91 98765 43210</span></div>
            <div class="contact-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.5">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                <circle cx="12" cy="10" r="3" />
              </svg><span>Hyderabad, India</span></div>
          </div>
        </div>
        <div class="contact-right">
          <form class="contact-form" id="contact-form" action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="0de20464-1c60-4e7a-913a-94ab9b7fa17d">
            <input type="hidden" name="subject" value="New Submission from Axiomate Website">

            <div class="form-group"><input type="text" name="name" id="form-name" class="form-input" placeholder=" "
                required /><label for="form-name" class="form-label">Your Name</label>
              <div class="form-line"></div>
            </div>
            <div class="form-group"><input type="email" name="email" id="form-email" class="form-input" placeholder=" "
                required /><label for="form-email" class="form-label">Email Address</label>
              <div class="form-line"></div>
            </div>
            <div class="form-group"><select name="service" id="form-service" class="form-input form-select" required>
                <option value="" disabled selected>Select a service</option>
                <option value="web">Web Development</option>
                <option value="ai">AI & Machine Learning</option>
                <option value="mobile">Mobile Apps</option>
                <option value="cloud">Cloud & DevOps</option>
                <option value="data">Data Engineering</option>
                <option value="security">Cybersecurity</option>
              </select>
              <div class="form-line"></div>
            </div>
            <div class="form-group"><textarea name="message" id="form-message" class="form-input form-textarea"
                placeholder=" " rows="4" required></textarea><label for="form-message" class="form-label">Tell us about
                your project</label>
              <div class="form-line"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-submit magnetic-btn" id="form-submit"><span>Send
                Message</span><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M22 2L11 13" />
                <path d="M22 2L15 22L11 13L2 9L22 2Z" />
              </svg></button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <axiomate-footer></axiomate-footer>
  <script type="module" src="/src/js/main.js"></script>
</body>

</html>
